<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendim | Create Key</title>
  <style>
    :root {
      --bg-1: #0b1020;
      --bg-2: #121a35;
      --accent: #7df9ff;
      --accent-2: #a78bfa;
      --text: #eef2ff;
      --muted: #9ca3af;
      --glass: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.2);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 20%, #1f2b57 0%, transparent 45%),
                  radial-gradient(circle at 80% 30%, #2d1f57 0%, transparent 35%),
                  linear-gradient(145deg, var(--bg-1), var(--bg-2));
      overflow: hidden;
    }

    .orb {
      position: fixed;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      filter: blur(48px);
      z-index: -1;
      opacity: 0.35;
      animation: drift 8s ease-in-out infinite alternate;
    }
    .orb.one { background: var(--accent); top: -80px; left: -70px; }
    .orb.two { background: var(--accent-2); bottom: -90px; right: -70px; animation-delay: 1s; }

    .card {
      width: min(92vw, 460px);
      padding: 2.2rem 1.8rem;
      border-radius: 24px;
      background: var(--glass);
      backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      text-align: center;
      animation: floatIn .8s cubic-bezier(.2,.8,.2,1);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 2.9rem);
      letter-spacing: .06em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #fff, #c5d4ff 45%, #e9d5ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shimmer 4s linear infinite;
      background-size: 200% auto;
    }

    .tagline {
      margin: .55rem 0 1.4rem;
      color: var(--muted);
      font-size: .96rem;
      letter-spacing: .04em;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: .88rem 1.5rem;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .2s ease, opacity .2s ease;
    }

    .btn-primary {
      color: #05131b;
      background: linear-gradient(90deg, var(--accent), #b9f7ff);
      box-shadow: 0 10px 26px rgba(125, 249, 255, 0.32);
    }
    .btn-primary:hover { transform: translateY(-2px) scale(1.02); }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.58);
      animation: fade .3s ease;
    }

    .modal.open { display: flex; }

    .modal-box {
      width: min(92vw, 430px);
      background: #111a33;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.4rem;
      box-shadow: 0 24px 50px rgba(0,0,0,.5);
      transform: translateY(10px);
      animation: pop .35s ease forwards;
    }

    .modal h2 { margin: 0 0 .5rem; font-size: 1.2rem; }
    .modal p { margin: 0 0 1rem; color: var(--muted); }

    .hidden-key {
      background: #0b1229;
      border: 1px dashed #3f4f84;
      color: transparent;
      text-shadow: 0 0 7px rgba(255,255,255,.65);
      user-select: none;
      border-radius: 12px;
      padding: .8rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      margin-bottom: 1rem;
      letter-spacing: .03em;
    }

    .actions {
      display: flex;
      gap: .7rem;
      justify-content: end;
    }

    .btn-copy {
      color: #071426;
      background: linear-gradient(90deg, #93c5fd, #67e8f9);
    }

    .btn-close {
      color: #dbeafe;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .status {
      margin-top: .7rem;
      min-height: 1.2em;
      color: #93c5fd;
      font-size: .9rem;
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(16px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes shimmer { to { background-position: 200% center; } }
    @keyframes drift { to { transform: translate(18px, -14px) scale(1.08); } }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pop { to { transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="orb one"></div>
  <div class="orb two"></div>

  <main class="card">
    <h1>Vendim</h1>
    <p class="tagline">Modern • Sleek • Animated</p>
    <button id="openModal" class="btn btn-primary">Create Key</button>
  </main>

  <section id="modal" class="modal" aria-hidden="true">
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="title">
      <h2 id="title">Your key is generated</h2>
      <p>The key text is intentionally hidden for privacy.</p>
      <div class="hidden-key" id="hiddenKey">wittle bittle diddle snittle</div>
      <div class="actions">
        <button id="closeModal" class="btn btn-close">Close</button>
        <button id="copyKey" class="btn btn-copy">Copy!</button>
      </div>
      <div class="status" id="status"></div>
    </div>
  </section>

  <script>
    const SECRET_KEY = `Old Key: FCk94mLamLeC 

API Key (Needed): w||i||||t||||t||||l||||e|| ||b||||i||||t||||t||||l||||e|| ||d||||i||||d||||d||||l||||e|| ||s||||n||||i||||t||||t||||l||||e||`;
    const modal = document.getElementById('modal');
    const openModal = document.getElementById('openModal');
    const closeModal = document.getElementById('closeModal');
    const copyKey = document.getElementById('copyKey');
    const status = document.getElementById('status');

    openModal.addEventListener('click', () => {
      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
      status.textContent = '';
    });

    closeModal.addEventListener('click', () => {
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
    });

    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal.click();
    });

    copyKey.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(SECRET_KEY);
        status.textContent = 'Copied to clipboard!';
      } catch {
        status.textContent = 'Clipboard permission blocked. Copy failed.';
      }
    });
  </script>
</body>
</html>
